# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - StreamLite

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: hub.docker.com/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_ECF939B5A738498CB18C74D6C0724C52 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_4298C65FC4C14A0FA6068D635D21CF0A }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: hub.docker.com/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_ECF939B5A738498CB18C74D6C0724C52 }}/appsvc/staticsite:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_960B7F13EA8941498290E6A6B32B85FF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D0B66BF3CFE14E2CB01EA8556C14C3C5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B6E91135ECB54472A1D0845657BD1107 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'StreamLite'
          slot-name: 'Production'
          images: 'hub.docker.com/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_ECF939B5A738498CB18C74D6C0724C52 }}/appsvc/staticsite:${{ github.sha }}'
          