name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ main, master ]

jobs:
  # 1. Continuous Integration (Build & Test)
  build-and-test:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, user-service, catalog-service, watchlist-service, playback-service]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Dependencies
      working-directory: ./${{ matrix.service }}
      run: npm install

    - name: Run Lint (if configured)
      working-directory: ./${{ matrix.service }}
      run: npm run lint --if-present

    - name: Run Tests (if configured)
      working-directory: ./${{ matrix.service }}
      run: npm run test --if-present

    - name: Build Docker Image
      working-directory: ./${{ matrix.service }}
      run: docker build -t streamlite-${{ matrix.service }}:${{ github.sha }} .

  # 2. Continuous Deployment (Run ONLY when merged/pushed to main)
  deploy-on-merge:
    name: Action on Merge to Main
    needs: build-and-test
    # This ensures the job only runs when a pull request is merged OR code is directly pushed to main/master
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Placeholder
        run: |
          echo "✅ Code was successfully merged to the main/master branch!"
          echo "🚀 You can add your Docker container registry push or deployment scripts here."
